<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Viewer — Planogram Agent</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/photo-viewer.css">
</head>
<body class="photo-viewer">
    <div class="toolbar">
        <a href="/" class="back-link">&larr; Back</a>
        <div class="sep"></div>
        <h1>Photo Viewer</h1>
        <div class="sep"></div>

        <div class="settings-dropdown">
            <button class="settings-btn" onclick="toggleSettings(event)">⚙️ Settings</button>
            <div class="settings-menu" id="settingsMenu">
                <div class="settings-section">
                    <div class="settings-label">View Mode</div>
                    <div class="view-toggle">
                        <button class="active" onclick="setView('all')">All Photos</button>
                        <button onclick="setView('single')">Single</button>
                    </div>
                    <select id="photoSelect" style="display:none;margin-top:8px;width:100%;font-size:11px;padding:5px 8px" onchange="loadSinglePhoto(this.value)">
                        {% for p in photos %}
                        <option value="{{ p }}">{{ p }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="settings-section">
                    <div class="settings-label">Zoom</div>
                    <div class="zoom-controls">
                        <button onclick="zoomAll(-0.05)" title="Zoom out">&minus;</button>
                        <span class="zoom-label" id="zoomLabel">fit</span>
                        <button onclick="zoomAll(0.05)" title="Zoom in">+</button>
                        <button onclick="zoomFitAll()" title="Fit to window">Fit</button>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-label">Display Layers</div>
                    <label>
                        <input type="checkbox" id="showProducts" checked onchange="renderAllOverlays()">
                        Products
                    </label>
                    <label>
                        <input type="checkbox" id="showShelves" onchange="renderAllOverlays()">
                        Shelves
                    </label>
                    <label>
                        <input type="checkbox" id="showLabels" onchange="renderAllOverlays()">
                        Labels
                    </label>
                </div>
                <div class="settings-section">
                    <div class="settings-label">Color Mode</div>
                    <div class="view-toggle" id="colorModeToggle">
                        <button class="active" data-mode="default" onclick="setColorMode('default')">Colors</button>
                        <button data-mode="salesPerMeter" onclick="setColorMode('salesPerMeter')">₽/meter</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="sep"></div>

        <div class="stats-bar">
            <span>Photos: <strong id="statPhotos">0</strong></span>
            <span>Unique SKUs: <strong id="statUnique">0</strong></span>
            <span>Facings: <strong id="statProducts">0</strong></span>
        </div>

        <div class="sep"></div>
        <button id="actionsBtn" onclick="toggleActionsPanel()" style="background:rgba(245,158,11,0.15);border-color:rgba(245,158,11,0.4);color:#f59e0b;font-weight:600">Actions <span id="actionsBadge"></span></button>
    </div>

    <!-- Actions Panel (slides from left) -->
    <div class="actions-overlay" id="actionsOverlay" onclick="closeActionsPanel()"></div>
    <div class="actions-panel" id="actionsPanel">
        <div class="actions-header">
            <h2>Planogram Actions</h2>
            <button class="actions-close" onclick="closeActionsPanel()">&times;</button>
        </div>
        <div class="actions-summary" id="actionsSummary"></div>
        <div class="actions-filters" id="actionsFilters">
            <button class="filter-btn active" data-apri="all" onclick="setActionFilter('all')">All</button>
            <button class="filter-btn" data-apri="high" onclick="setActionFilter('high')">High</button>
            <button class="filter-btn" data-apri="medium" onclick="setActionFilter('medium')">Medium</button>
            <button class="filter-btn" data-apri="low" onclick="setActionFilter('low')">Low</button>
        </div>
        <div class="actions-list" id="actionsList">
            <div class="empty-state">Loading actions...</div>
        </div>
    </div>

    <div class="main-area">
        <div class="photos-grid" id="photosGrid"></div>

        <!-- Floating button to reopen panel when hidden -->
        <button class="panel-toggle-fab" id="panelToggleFab" onclick="togglePanel()" title="Show details panel" style="display:none">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
        </button>

        <div class="detail-panel" id="detailPanel">
            <div class="detail-panel-header">
                <h2>Details</h2>
                <button class="panel-close-btn" onclick="togglePanel()" title="Close details panel">&times;</button>
            </div>
            <div id="detailContent">
                <div class="empty-state">Click a bounding box to see details</div>
            </div>

            <div class="product-list" id="productList">
                <h3>All products across photos</h3>
                <input type="text" class="search-input" id="searchInput" placeholder="Search products..." oninput="filterProductList()">
                <div class="filter-bar" id="filterBar">
                    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
                    <button class="filter-btn" data-filter="not-in-plano" onclick="setFilter('not-in-plano')">Not in plano</button>
                    <button class="filter-btn" data-filter="less" onclick="setFilter('less')">Less</button>
                    <button class="filter-btn" data-filter="equal" onclick="setFilter('equal')">Equal</button>
                    <button class="filter-btn" data-filter="more" onclick="setFilter('more')">More</button>
                    <button class="filter-btn" data-filter="out-of-shelf" onclick="setFilter('out-of-shelf')">Out of shelf</button>
                </div>
                <div class="filter-counts" id="filterCounts"></div>
                <div id="productListItems"></div>
            </div>
        </div>
    </div>

    <script>
    let PHOTOS = {{ photos | tojson }};
    const photoDataMap = {};   // photoName → {products, shelves, source}
    const photoScales = {};    // photoName → scale
    const photoNaturalSizes = {}; // photoName → {w, h}
    let planogramFacings = {}; // tiny_name → {facings_wide, positions}
    let salesData = {};        // tiny_name → {avg_sale_amount, avg_sale_qty, ...}

    let currentView = 'all';
    let selectedId = null;
    let selectedPhotoName = null;
    let selectedArt = null;
    let activeFilter = 'all';
    let globalScale = null;    // will be computed on fit

    const PRODUCT_COLORS = {};
    const COLOR_PALETTE = [
        '#e94560','#00b4d8','#90be6d','#f9c74f','#f8961e',
        '#43aa8b','#577590','#f3722c','#4cc9f0','#7209b7',
        '#3a86a7','#fb5607','#ff006e','#8338ec','#06d6a0',
        '#118ab2','#ef476f','#ffd166','#073b4c','#06aed5'
    ];

    let colorMode = 'default';
    let salesPerMeterMap = {};
    let avgSalesPerMeter = 0;

    function getColorForArt(art) {
        if (!PRODUCT_COLORS[art]) {
            const idx = Object.keys(PRODUCT_COLORS).length % COLOR_PALETTE.length;
            PRODUCT_COLORS[art] = COLOR_PALETTE[idx];
        }
        return PRODUCT_COLORS[art];
    }

    function getBoxColor(art) {
        if (colorMode === 'salesPerMeter') {
            const data = salesPerMeterMap[art];
            if (data) return data.color;
            return '#888888';
        }
        return getColorForArt(art);
    }

    function calculateSalesPerMeter() {
        salesPerMeterMap = {};
        const artInfo = {};

        PHOTOS.forEach(name => {
            const data = photoDataMap[name];
            if (!data) return;
            data.products.forEach(p => {
                if (!artInfo[p.art]) {
                    artInfo[p.art] = { count: 0, width_cm: p.facing_width_cm || 0 };
                }
                artInfo[p.art].count++;
                if (!artInfo[p.art].width_cm && p.facing_width_cm) {
                    artInfo[p.art].width_cm = p.facing_width_cm;
                }
            });
        });

        const values = [];
        Object.entries(artInfo).forEach(([art, info]) => {
            const sd = salesData[art];
            if (!sd || !info.width_cm || info.count === 0) return;
            const totalShelfMeters = info.count * info.width_cm / 100;
            const spm = sd.avg_sale_amount / totalShelfMeters;
            salesPerMeterMap[art] = { salesPerMeter: spm, color: '#22c55e' };
            values.push(spm);
        });

        avgSalesPerMeter = values.length > 0
            ? values.reduce((a, b) => a + b, 0) / values.length
            : 0;

        Object.entries(salesPerMeterMap).forEach(([art, data]) => {
            if (data.salesPerMeter >= avgSalesPerMeter * 2) {
                data.color = '#ef4444'; // red — 2x above average
            } else if (data.salesPerMeter <= avgSalesPerMeter / 2) {
                data.color = '#f59e0b'; // yellow — 2x below average
            } else {
                data.color = '#22c55e'; // green — normal range
            }
        });
    }

    function setColorMode(mode) {
        colorMode = mode;
        document.querySelectorAll('#colorModeToggle button').forEach(b => {
            b.classList.toggle('active', b.getAttribute('data-mode') === mode);
        });
        if (mode === 'salesPerMeter') {
            calculateSalesPerMeter();
        }
        renderAllOverlays();
        renderProductList();
        updateSalesPerMeterLegend();
    }

    function updateSalesPerMeterLegend() {
        let existing = document.getElementById('spmLegend');
        if (colorMode !== 'salesPerMeter') {
            if (existing) existing.remove();
            return;
        }
        if (!existing) {
            existing = document.createElement('div');
            existing.id = 'spmLegend';
            existing.className = 'spm-legend';
            document.querySelector('.toolbar').appendChild(existing);
        }
        const avgFormatted = avgSalesPerMeter.toLocaleString('ru-RU', {maximumFractionDigits: 0});
        existing.innerHTML = `
            <span class="spm-dot" style="background:#ef4444"></span> &gt;2× avg (${avgFormatted} ₽/m)
            <span class="spm-dot" style="background:#22c55e;margin-left:8px"></span> normal
            <span class="spm-dot" style="background:#f59e0b;margin-left:8px"></span> &lt;½ avg
            <span class="spm-dot" style="background:#888;margin-left:8px"></span> no data
        `;
    }

    function rebuildPhotoSelect() {
        const sel = document.getElementById('photoSelect');
        sel.innerHTML = PHOTOS.map(p => `<option value="${p}">${p}</option>`).join('');
    }

    function setView(mode) {
        currentView = mode;
        const viewToggle = event.target.closest('.settings-section').querySelector('.view-toggle');
        const btns = viewToggle.querySelectorAll('button');
        btns.forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('photoSelect').style.display = mode === 'single' ? 'block' : 'none';
        if (mode === 'single') {
            const sel = document.getElementById('photoSelect').value;
            loadSinglePhoto(sel);
        } else {
            loadAllPhotos();
        }
    }

    function loadSinglePhoto(name) {
        buildGrid([name]);
    }

    async function loadAllPhotos() {
        buildGrid(PHOTOS);
    }

    function buildGrid(photoNames) {
        const grid = document.getElementById('photosGrid');
        grid.innerHTML = '';
        let loadedCount = 0;

        photoNames.forEach(name => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.id = `card-${name}`;
            card.innerHTML = `
                <div class="photo-header">
                    <span class="photo-title">${name}</span>
                    <span class="photo-stats" id="stats-${name}">Loading...</span>
                </div>
                <div class="canvas-inner" id="canvas-${name}">
                    <img id="img-${name}" alt="${name}">
                    <svg id="svg-${name}" xmlns="http://www.w3.org/2000/svg"></svg>
                </div>
            `;
            grid.appendChild(card);

            const img = document.getElementById(`img-${name}`);
            img.onload = function() {
                photoNaturalSizes[name] = { w: img.naturalWidth, h: img.naturalHeight };
                fetchPhotoData(name);
                loadedCount++;
                if (loadedCount === photoNames.length) {
                    setTimeout(zoomFitAll, 50);
                }
            };
            img.src = `/demo-images/${name}.jpg`;
        });
    }

    async function fetchPhotoData(name) {
        if (photoDataMap[name]) {
            renderOverlay(name);
            updateStats();
            return;
        }
        const resp = await fetch(`/api/photo-data/${name}`);
        photoDataMap[name] = await resp.json();
        renderOverlay(name);
        updateStats();
        renderProductList();
    }

    function updateStats() {
        const activePhotos = Object.keys(photoDataMap).filter(n =>
            document.getElementById(`card-${n}`)
        );
        let totalFacings = 0;
        const uniqueArts = new Set();
        activePhotos.forEach(n => {
            const data = photoDataMap[n];
            if (!data) return;
            totalFacings += data.products.length;
            data.products.forEach(p => uniqueArts.add(p.art));
        });
        document.getElementById('statPhotos').textContent = activePhotos.length;
        document.getElementById('statUnique').textContent = uniqueArts.size;
        document.getElementById('statProducts').textContent = totalFacings;
    }

    function renderAllOverlays() {
        PHOTOS.forEach(name => {
            if (photoDataMap[name] && document.getElementById(`svg-${name}`)) {
                renderOverlay(name);
            }
        });
    }

    function renderOverlay(name) {
        const data = photoDataMap[name];
        if (!data) return;
        const size = photoNaturalSizes[name];
        if (!size) return;

        const svg = document.getElementById(`svg-${name}`);
        svg.setAttribute('width', size.w);
        svg.setAttribute('height', size.h);
        svg.setAttribute('viewBox', `0 0 ${size.w} ${size.h}`);
        svg.innerHTML = '';

        const showProducts = document.getElementById('showProducts').checked;
        const showShelves = document.getElementById('showShelves').checked;
        const showLabels = document.getElementById('showLabels').checked;

        const statsEl = document.getElementById(`stats-${name}`);
        if (statsEl) {
            const uniqueInPhoto = new Set(data.products.map(p => p.art)).size;
            statsEl.innerHTML = `SKUs: <strong>${uniqueInPhoto}</strong> &nbsp; Facings: <strong>${data.products.length}</strong> &nbsp; Shelves: <strong>${data.shelves.length}</strong>`;
        }

        if (showShelves) {
            const gShelves = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            data.shelves.forEach((s, i) => {
                const y = Math.min(s.y1, s.y2);
                const h = Math.abs(s.y2 - s.y1) || 6;

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', s.x1);
                rect.setAttribute('y', y - 3);
                rect.setAttribute('width', s.x2 - s.x1);
                rect.setAttribute('height', h + 6);
                rect.setAttribute('fill', 'rgba(0,180,216,0.2)');
                rect.setAttribute('stroke', '#00b4d8');
                rect.setAttribute('stroke-width', '8');
                rect.setAttribute('class', 'bbox-shelf');
                rect.setAttribute('data-shelf-idx', i);
                rect.setAttribute('data-photo', name);
                rect.onclick = () => selectShelf(name, i);
                gShelves.appendChild(rect);

                if (showLabels) {
                    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    txt.setAttribute('x', s.x1 + 8);
                    txt.setAttribute('y', y - 8);
                    txt.setAttribute('fill', '#00b4d8');
                    txt.setAttribute('font-size', '40');
                    txt.setAttribute('class', 'bbox-label');
                    txt.textContent = `Shelf ${i + 1}`;
                    gShelves.appendChild(txt);
                }
            });
            svg.appendChild(gShelves);
        }

        if (showProducts) {
            const gProducts = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            data.products.forEach((p, i) => {
                const color = getBoxColor(p.art);
                const w = p.x2 - p.x1;
                const h = p.y2 - p.y1;

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', p.x1);
                rect.setAttribute('y', p.y1);
                rect.setAttribute('width', w);
                rect.setAttribute('height', h);
                rect.setAttribute('fill', color + '22');
                rect.setAttribute('stroke', color);
                rect.setAttribute('stroke-width', '6');
                rect.setAttribute('rx', '4');
                rect.setAttribute('class', 'bbox-product');
                rect.setAttribute('data-product-idx', i);
                rect.setAttribute('data-product-id', p._id);
                rect.setAttribute('data-art', p.art);
                rect.setAttribute('data-photo', name);
                rect.style.opacity = (selectedId === p._id && selectedPhotoName === name) ? '1' : '0.7';
                rect.onclick = (e) => { e.stopPropagation(); selectProduct(name, i); };
                gProducts.appendChild(rect);

                if (showLabels) {
                    const labelBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    const displayName = p.display_name || p.art;
                    const fontSize = Math.min(36, Math.max(16, w * 0.12));
                    const labelW = Math.min(w, displayName.length * fontSize * 0.55 + 8);
                    const labelH = fontSize + 6;
                    labelBg.setAttribute('x', p.x1);
                    labelBg.setAttribute('y', p.y1 - labelH);
                    labelBg.setAttribute('width', labelW);
                    labelBg.setAttribute('height', labelH);
                    labelBg.setAttribute('fill', color);
                    labelBg.setAttribute('rx', '3');
                    labelBg.setAttribute('class', 'bbox-label-bg');
                    labelBg.setAttribute('data-art', p.art);
                    labelBg.style.pointerEvents = 'none';
                    gProducts.appendChild(labelBg);

                    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    txt.setAttribute('x', p.x1 + 4);
                    txt.setAttribute('y', p.y1 - 5);
                    txt.setAttribute('fill', '#fff');
                    txt.setAttribute('font-size', fontSize);
                    txt.setAttribute('class', 'bbox-label');
                    txt.setAttribute('data-art', p.art);
                    txt.textContent = displayName;
                    gProducts.appendChild(txt);
                }
            });
            svg.appendChild(gProducts);
        }

        highlightSelected();
    }

    function selectProduct(photoName, idx) {
        const data = photoDataMap[photoName];
        const p = data.products[idx];
        selectedId = p._id;
        selectedPhotoName = photoName;
        selectedArt = p.art;
        const isRich = !!p.brand_name;

        // Count facings across all photos for this art
        let totalPhotoFacings = 0;
        const photoBreakdown = [];
        PHOTOS.forEach(name => {
            const d = photoDataMap[name];
            if (!d) return;
            const cnt = d.products.filter(pp => pp.art === p.art).length;
            if (cnt > 0) {
                totalPhotoFacings += cnt;
                photoBreakdown.push({ name, count: cnt });
            }
        });
        const pf = planogramFacings[p.art];
        const inPlano = !!pf;
        const planoFacings = pf ? pf.facings_wide : 0;

        let html = '';

        const fullName = p.full_name || p.display_name || p.art;
        const thumbUrl = p.miniature_url || '';
        html += `
            <div class="detail-header">
                ${thumbUrl ? `<img class="detail-thumb" src="${thumbUrl}" alt="${fullName}" onerror="this.style.display='none'">` : ''}
                <div class="detail-header-info">
                    <div class="field-value" style="font-weight:600;font-size:12px;margin-bottom:4px;line-height:1.3">${fullName}</div>
                    <div style="margin-bottom:4px">
                        ${p.brand_name ? `<span class="tag tag-brand">${p.brand_name}</span>` : ''}
                        ${p.category_name ? `<span class="tag tag-category">${p.category_name}</span>` : ''}
                    </div>
                    ${p.price ? `<span class="tag tag-price">${p.price} ₽</span>` : ''}
                </div>
            </div>
        `;

        // Planogram status
        html += `<div class="field" style="margin-bottom:12px">`;
        if (inPlano) {
            html += `<span class="tag-plano" style="font-size:11px;padding:3px 8px">In Planogram</span>`;
        } else {
            html += `<span class="tag-alert" style="font-size:11px;padding:3px 8px">Not in Planogram</span>`;
        }
        html += `</div>`;

        // Facings comparison
        html += `
            <div class="field">
                <div class="field-label">Facings Comparison</div>
                <div class="dims-grid" style="margin-top:4px">
                    <span class="dim-label">Planogram</span><span class="dim-value">${inPlano ? planoFacings : '—'}</span>
                    <span class="dim-label">On Shelf (photos)</span><span class="dim-value">${totalPhotoFacings}</span>
                </div>
            </div>
        `;

        // Per-photo breakdown
        if (photoBreakdown.length > 0) {
            html += `<div class="field"><div class="field-label">Per Photo</div>`;
            photoBreakdown.forEach(pb => {
                html += `<div style="font-size:11px;color:#ccc;margin-top:2px">${pb.name}: <strong>${pb.count}</strong> facing${pb.count > 1 ? 's' : ''}</div>`;
            });
            html += `</div>`;
        }

        if (p.barcode) {
            html += `<div class="field"><div class="field-label">Barcode</div><div class="field-value" style="font-family:monospace;font-size:11px">${p.barcode}</div></div>`;
        }
        if (p.facing_width_cm) {
            html += `<div class="field"><div class="field-label">Size (cm)</div><div class="field-value" style="font-size:11px">${p.facing_width_cm.toFixed(1)} × ${p.facing_height_cm.toFixed(1)}</div></div>`;
        }

        const sd = salesData[p.art] || salesData[p.product_id];
        if (sd) {
            html += `
                <div class="field">
                    <div class="field-label">Sales Data (weekly avg)</div>
                    <div class="dims-grid" style="margin-top:4px">
                        <span class="dim-label">Avg Sale ₽</span><span class="dim-value" style="color:#4ecdc4;font-weight:600">${sd.avg_sale_amount.toLocaleString('ru-RU', {minimumFractionDigits: 0, maximumFractionDigits: 0})} ₽</span>
                        <span class="dim-label">Avg Qty</span><span class="dim-value">${sd.avg_sale_qty.toFixed(1)}</span>
                        <span class="dim-label">Avg Stock</span><span class="dim-value">${sd.avg_stock_qty.toFixed(1)}</span>
                        <span class="dim-label">Weeks</span><span class="dim-value">${sd.weeks}</span>
                    </div>
                </div>
            `;
        }

        document.getElementById('detailContent').innerHTML = html;
        
        // Show the detail panel if it's hidden
        const panel = document.getElementById('detailPanel');
        const fab = document.getElementById('panelToggleFab');
        if (panel.classList.contains('hidden')) {
            panel.classList.remove('hidden');
            fab.style.display = 'none';
        }
        
        highlightSelected();
        highlightListItem();
    }

    function selectOutOfShelfProduct(art) {
        selectedId = null;
        selectedPhotoName = null;
        selectedArt = art;

        const pf = planogramFacings[art];
        if (!pf) return;
        const planoFacings = pf.facings_wide;

        const fullName = pf.name || art;
        const thumbUrl = pf.image_url || '';
        const brand = pf.brand || '';

        let html = `
            <div class="detail-header">
                ${thumbUrl ? `<img class="detail-thumb" src="${thumbUrl}" alt="${fullName}" onerror="this.style.display='none'">` : ''}
                <div class="detail-header-info">
                    <div class="field-value" style="font-weight:600;font-size:12px;margin-bottom:4px;line-height:1.3">${fullName}</div>
                    <div style="margin-bottom:4px">
                        ${brand ? `<span class="tag tag-brand">${brand}</span>` : ''}
                    </div>
                </div>
            </div>
        `;

        html += `<div class="field" style="margin-bottom:12px">
            <span class="tag-oos" style="font-size:11px;padding:3px 8px">Out of Shelf</span>
        </div>`;

        html += `
            <div class="field">
                <div class="field-label">Facings Comparison</div>
                <div class="dims-grid" style="margin-top:4px">
                    <span class="dim-label">Planogram</span><span class="dim-value">${planoFacings}</span>
                    <span class="dim-label">On Shelf (photos)</span><span class="dim-value" style="color:#ef4444">0</span>
                </div>
            </div>
        `;

        if (pf.width_cm) {
            html += `<div class="field"><div class="field-label">Size (cm)</div><div class="field-value" style="font-size:11px">${pf.width_cm.toFixed(1)} × ${pf.height_cm.toFixed(1)}</div></div>`;
        }

        const sd = salesData[art];
        if (sd) {
            html += `
                <div class="field">
                    <div class="field-label">Sales Data (weekly avg)</div>
                    <div class="dims-grid" style="margin-top:4px">
                        <span class="dim-label">Avg Sale ₽</span><span class="dim-value" style="color:#4ecdc4;font-weight:600">${sd.avg_sale_amount.toLocaleString('ru-RU', {minimumFractionDigits: 0, maximumFractionDigits: 0})} ₽</span>
                        <span class="dim-label">Avg Qty</span><span class="dim-value">${sd.avg_sale_qty.toFixed(1)}</span>
                        <span class="dim-label">Avg Stock</span><span class="dim-value">${sd.avg_stock_qty.toFixed(1)}</span>
                        <span class="dim-label">Weeks</span><span class="dim-value">${sd.weeks}</span>
                    </div>
                </div>
            `;
        }

        document.getElementById('detailContent').innerHTML = html;
        
        // Show the detail panel if it's hidden
        const panel = document.getElementById('detailPanel');
        const fab = document.getElementById('panelToggleFab');
        if (panel.classList.contains('hidden')) {
            panel.classList.remove('hidden');
            fab.style.display = 'none';
        }
        
        highlightListItem();
    }

    function selectShelf(photoName, idx) {
        const data = photoDataMap[photoName];
        const s = data.shelves[idx];
        selectedId = s._id;
        selectedPhotoName = photoName;

        const html = `
            <span class="tag tag-photo">${photoName}</span><br><br>
            <div class="field">
                <div class="field-label">Type</div>
                <div class="field-value">Shelf Line ${idx + 1}</div>
            </div>
            <div class="field">
                <div class="field-label">Line Coordinates</div>
                <div class="field-value" style="font-family:monospace">
                    (${s.x1}, ${s.y1}) &rarr; (${s.x2}, ${s.y2})
                    <br>Width: ${s.x2 - s.x1} px
                </div>
            </div>
            <div class="field">
                <div class="field-label">Line Type</div>
                <div class="field-value">${s.line_type || 'raw'}</div>
            </div>
            <div class="field">
                <div class="field-label">Approved</div>
                <div class="field-value">${s.approved ? 'Yes' : 'No'}</div>
            </div>
            <div class="field">
                <div class="field-label">ID</div>
                <div class="field-value" style="font-family:monospace;font-size:10px">${s._id}</div>
            </div>
        `;
        document.getElementById('detailContent').innerHTML = html;
        
        // Show the detail panel if it's hidden
        const panel = document.getElementById('detailPanel');
        const fab = document.getElementById('panelToggleFab');
        if (panel.classList.contains('hidden')) {
            panel.classList.remove('hidden');
            fab.style.display = 'none';
        }
        
        highlightSelected();
    }

    function highlightSelected() {
        const hasSelection = !!selectedArt;

        document.querySelectorAll('.bbox-product').forEach(el => {
            const art = el.getAttribute('data-art');
            const origColor = getBoxColor(art);

            if (!hasSelection) {
                el.setAttribute('stroke', origColor);
                el.setAttribute('fill', origColor + '22');
                el.setAttribute('stroke-width', '6');
                el.style.opacity = '0.7';
            } else if (art === selectedArt) {
                el.setAttribute('stroke', '#ffd166');
                el.setAttribute('fill', 'rgba(255,209,102,0.25)');
                el.setAttribute('stroke-width', '10');
                el.style.opacity = '1';
            } else {
                el.setAttribute('stroke', '#666');
                el.setAttribute('fill', 'rgba(100,100,100,0.15)');
                el.setAttribute('stroke-width', '4');
                el.style.opacity = '0.4';
            }
        });

        document.querySelectorAll('.bbox-label-bg').forEach(el => {
            const art = el.getAttribute('data-art');
            const origColor = getBoxColor(art);
            if (!hasSelection) {
                el.setAttribute('fill', origColor);
                el.style.opacity = '1';
            } else if (art === selectedArt) {
                el.setAttribute('fill', '#ffd166');
                el.style.opacity = '1';
            } else {
                el.setAttribute('fill', '#555');
                el.style.opacity = '0.4';
            }
        });

        document.querySelectorAll('.bbox-label').forEach(el => {
            const art = el.getAttribute('data-art');
            if (!hasSelection || art === selectedArt) {
                el.style.opacity = '1';
            } else {
                el.style.opacity = '0.3';
            }
        });

        document.querySelectorAll('.bbox-shelf').forEach(el => {
            const idx = parseInt(el.getAttribute('data-shelf-idx'));
            const photo = el.getAttribute('data-photo');
            const data = photoDataMap[photo];
            if (data) {
                const s = data.shelves[idx];
                if (s._id === selectedId && photo === selectedPhotoName) {
                    el.setAttribute('stroke-width', '12');
                    el.setAttribute('fill', 'rgba(0,180,216,0.35)');
                } else {
                    el.setAttribute('stroke-width', '8');
                    el.setAttribute('fill', 'rgba(0,180,216,0.2)');
                }
            }
        });
    }

    function clearSelection() {
        selectedId = null;
        selectedPhotoName = null;
        selectedArt = null;
        document.getElementById('detailContent').innerHTML =
            '<div class="empty-state">Click a bounding box to see details</div>';
        highlightSelected();
        highlightListItem();
    }

    function getProductStatus(art, photoFacings) {
        const pf = planogramFacings[art];
        if (!pf) return 'not-in-plano';
        if (photoFacings === 0) return 'out-of-shelf';
        const plano = pf.facings_wide;
        if (photoFacings < plano) return 'less';
        if (photoFacings === plano) return 'equal';
        return 'more';
    }

    function renderProductList() {
        const artCounts = {};
        PHOTOS.forEach(name => {
            const data = photoDataMap[name];
            if (!data) return;
            data.products.forEach(p => {
                const key = p.art;
                if (!artCounts[key]) {
                    artCounts[key] = {
                        count: 0,
                        display_name: p.display_name,
                        miniature_url: p.miniature_url || '',
                        brand_name: p.brand_name || '',
                        photos: new Set(),
                        firstPhoto: name,
                        firstIdx: data.products.indexOf(p),
                    };
                }
                artCounts[key].count++;
                artCounts[key].photos.add(name);
            });
        });

        // Add out-of-shelf: products in planogram but not in any photo
        Object.keys(planogramFacings).forEach(art => {
            if (!artCounts[art]) {
                const pf = planogramFacings[art];
                artCounts[art] = {
                    count: 0,
                    display_name: pf.name || art,
                    miniature_url: pf.image_url || '',
                    brand_name: pf.brand || '',
                    photos: new Set(),
                    firstPhoto: '',
                    firstIdx: -1,
                    isOutOfShelf: true,
                };
            }
        });

        const statusOrder = { 'not-in-plano': 0, 'out-of-shelf': 1, 'less': 2, 'more': 3, 'equal': 4 };
        const items = Object.entries(artCounts)
            .map(([art, info]) => {
                const status = getProductStatus(art, info.count);
                return [art, info, status];
            })
            .sort((a, b) => {
                const sa = statusOrder[a[2]] ?? 5;
                const sb = statusOrder[b[2]] ?? 5;
                if (sa !== sb) return sa - sb;
                return b[1].count - a[1].count;
            });

        // Count per status
        const counts = { all: items.length };
        items.forEach(([, , status]) => { counts[status] = (counts[status] || 0) + 1; });
        document.getElementById('filterCounts').innerHTML =
            `<span style="color:#ef4444">${counts['not-in-plano']||0} not in plano</span> · ` +
            `<span style="color:#f59e0b">${counts['less']||0} less</span> · ` +
            `<span style="color:#34d399">${counts['equal']||0} equal</span> · ` +
            `<span style="color:#4a9eff">${counts['more']||0} more</span> · ` +
            `<span style="color:#facc15">${counts['out-of-shelf']||0} out of shelf</span>`;

        const container = document.getElementById('productListItems');
        container.innerHTML = items.map(([art, info, status]) => {
            const thumb = info.miniature_url
                ? `<img class="thumb" src="${info.miniature_url}" alt="" onerror="this.style.display='none'">`
                : `<span class="color-dot" style="background:${getBoxColor(art)}"></span>`;
            const pf = planogramFacings[art];
            const planoFacings = pf ? pf.facings_wide : 0;
            const photoFacings = info.count;

            let badge = '';
            if (status === 'not-in-plano') {
                badge = `<span class="tag-alert">Not in plano</span><span class="tag-photo-f">S:${photoFacings}</span>`;
            } else if (status === 'out-of-shelf') {
                badge = `<span class="tag-oos">Out of shelf</span><span class="tag-plano">P:${planoFacings}</span>`;
            } else {
                badge = `<span class="tag-plano">P:${planoFacings}</span><span class="tag-photo-f">S:${photoFacings}</span>`;
            }

            const cssClass = status === 'not-in-plano' ? ' not-in-plano' : status === 'out-of-shelf' ? ' out-of-shelf' : '';
            const clickHandler = info.firstPhoto
                ? `onclick="selectByArt('${art}')"`
                : info.isOutOfShelf
                    ? `onclick="selectOutOfShelfProduct('${art}')"`
                    : '';

            return `
                <div class="product-list-item${cssClass}" data-art="${art}" data-status="${status}" data-photo="${info.firstPhoto}" ${clickHandler}>
                    ${thumb}
                    <span style="flex:1">
                        ${info.display_name}${info.brand_name ? `<br><span style="font-size:9px;color:#888">${info.brand_name}</span>` : ''}
                        <br>${badge}
                    </span>
                </div>
            `;
        }).join('');

        applyFilter();
    }

    function setFilter(filter) {
        activeFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.toggle('active', b.getAttribute('data-filter') === filter);
        });
        applyFilter();
    }

    function applyFilter() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.product-list-item').forEach(el => {
            const status = el.getAttribute('data-status');
            const text = el.textContent.toLowerCase();
            const matchesFilter = activeFilter === 'all' || status === activeFilter;
            const matchesSearch = !q || text.includes(q);
            el.style.display = (matchesFilter && matchesSearch) ? '' : 'none';
        });
    }

    function selectByArt(art) {
        for (const name of PHOTOS) {
            const data = photoDataMap[name];
            if (!data) continue;
            const idx = data.products.findIndex(p => p.art === art);
            if (idx >= 0) {
                selectProduct(name, idx);
                return;
            }
        }
    }

    function highlightListItem() {
        document.querySelectorAll('.product-list-item').forEach(el => {
            el.classList.remove('selected');
        });
        if (selectedArt && !selectedId) {
            const el = document.querySelector(`.product-list-item[data-art="${selectedArt}"]`);
            if (el) el.classList.add('selected');
        } else if (selectedId && selectedPhotoName) {
            const data = photoDataMap[selectedPhotoName];
            if (data) {
                const p = data.products.find(pp => pp._id === selectedId);
                if (p) {
                    const el = document.querySelector(`.product-list-item[data-art="${p.art}"]`);
                    if (el) el.classList.add('selected');
                }
            }
        }
    }

    function filterProductList() {
        applyFilter();
    }

    // Zoom: set actual image width so layout reflows properly for scrolling
    function applyScaleToPhoto(name, scale) {
        const img = document.getElementById(`img-${name}`);
        const size = photoNaturalSizes[name];
        if (!img || !size) return;
        const w = Math.round(size.w * scale);
        const h = Math.round(size.h * scale);
        img.style.width = w + 'px';
        img.style.height = h + 'px';
        photoScales[name] = scale;
    }

    function zoomAll(delta) {
        if (globalScale === null) globalScale = 0.3;
        globalScale = Math.max(0.05, Math.min(2, globalScale + delta));
        PHOTOS.forEach(name => {
            if (document.getElementById(`canvas-${name}`)) {
                applyScaleToPhoto(name, globalScale);
            }
        });
        document.getElementById('zoomLabel').textContent = Math.round(globalScale * 100) + '%';
    }

    function zoomFitAll() {
        const grid = document.getElementById('photosGrid');
        const panel = document.getElementById('detailPanel');
        const toolbar = document.querySelector('.toolbar');
        const visiblePhotos = PHOTOS.filter(n => document.getElementById(`card-${n}`));
        const count = visiblePhotos.length || 1;

        // Compute available space: window minus detail panel, toolbar, padding, gaps, borders
        const totalW = window.innerWidth - panel.offsetWidth - 1;
        const totalH = window.innerHeight - toolbar.offsetHeight;
        const headerH = 26; // photo-header height per card
        const pad = 16;
        const gaps = (count - 1) * 8;
        const availW = (totalW - pad - gaps) / count;
        const availH = totalH - pad - headerH;

        let fitScale = 1;
        visiblePhotos.forEach(name => {
            const size = photoNaturalSizes[name];
            if (!size) return;
            const sw = availW / size.w;
            const sh = availH / size.h;
            fitScale = Math.min(fitScale, sw, sh);
        });

        globalScale = Math.max(0.02, fitScale);
        visiblePhotos.forEach(name => applyScaleToPhoto(name, globalScale));
        document.getElementById('zoomLabel').textContent = Math.round(globalScale * 100) + '%';
    }

    function togglePanel() {
        const panel = document.getElementById('detailPanel');
        const fab = document.getElementById('panelToggleFab');
        panel.classList.toggle('hidden');
        
        // Show floating button when panel is hidden
        if (panel.classList.contains('hidden')) {
            fab.style.display = 'flex';
        } else {
            fab.style.display = 'none';
        }
        
        setTimeout(zoomFitAll, 250);
    }

    // Mouse wheel zoom on grid
    document.getElementById('photosGrid').addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.02 : 0.02;
        zoomAll(delta);
    }, { passive: false });

    // Drag-to-pan
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let scrollStartX = 0, scrollStartY = 0;

    const grid = document.getElementById('photosGrid');

    grid.addEventListener('mousedown', (e) => {
        if (e.target.closest('.bbox-product') || e.target.closest('.bbox-shelf')) return;
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        scrollStartX = grid.scrollLeft;
        scrollStartY = grid.scrollTop;
        grid.classList.add('dragging');
        e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        grid.scrollLeft = scrollStartX - dx;
        grid.scrollTop = scrollStartY - dy;
    });

    window.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false;
            grid.classList.remove('dragging');
        }
    });

    // Click on empty space to deselect (only if not dragging)
    let dragDistance = 0;
    grid.addEventListener('mousedown', (e) => { dragDistance = 0; });
    grid.addEventListener('mousemove', () => { if (isDragging) dragDistance++; });
    grid.addEventListener('click', (e) => {
        if (dragDistance > 3) return;
        if (e.target.tagName === 'IMG' || e.target.classList.contains('photos-grid') ||
            e.target.classList.contains('photo-card')) {
            clearSelection();
        }
    });

    // ── Actions Panel ──────────────────────────────────────────────────────
    let actionsData = [];
    let actionsLoaded = false;
    let actionFilter = 'all';

    function toggleActionsPanel() {
        const panel = document.getElementById('actionsPanel');
        const overlay = document.getElementById('actionsOverlay');
        const isOpen = panel.classList.contains('open');
        if (isOpen) {
            closeActionsPanel();
        } else {
            panel.classList.add('open');
            overlay.classList.add('open');
            if (!actionsLoaded) loadActions();
            else renderActions();
        }
    }

    function closeActionsPanel() {
        document.getElementById('actionsPanel').classList.remove('open');
        document.getElementById('actionsOverlay').classList.remove('open');
    }

    function loadActions() {
        const loadingTimeout = setTimeout(() => {
            if (!actionsLoaded) {
                document.getElementById('actionsList').innerHTML =
                    `<div class="empty-state">⏱️ Loading is taking longer than expected...<br>
                    <button onclick="loadActions()" style="margin-top:12px;padding:8px 16px;border:1px solid #444;background:#2a2a2a;color:#fff;border-radius:6px;cursor:pointer">Retry</button></div>`;
            }
        }, 8000);

        // Fetch with AbortController for timeout
        const controller = new AbortController();
        const fetchTimeout = setTimeout(() => controller.abort(), 15000);

        fetch('/api/actions', { signal: controller.signal })
            .then(r => {
                clearTimeout(fetchTimeout);
                if (!r.ok) {
                    throw new Error(`HTTP ${r.status}: ${r.statusText}`);
                }
                return r.json();
            })
            .then(data => {
                clearTimeout(loadingTimeout);
                if (data.status === 'success') {
                    actionsData = data.actions;
                    actionsLoaded = true;
                    renderActions();
                    const badge = document.getElementById('actionsBadge');
                    badge.textContent = actionsData.length;
                } else {
                    throw new Error(data.error || 'Unknown error');
                }
            })
            .catch(err => {
                clearTimeout(loadingTimeout);
                clearTimeout(fetchTimeout);
                console.error('[photo_viewer] Failed to load actions:', err);
                actionsLoaded = false;
                const errMsg = err.name === 'AbortError' 
                    ? 'Request timed out (>15s). Server might be slow or unavailable.'
                    : err.message;
                document.getElementById('actionsList').innerHTML =
                    `<div class="empty-state">❌ Failed to load actions<br>
                    <span style="color:#888;font-size:11px">${errMsg}</span><br>
                    <button onclick="loadActions()" style="margin-top:12px;padding:8px 16px;border:1px solid #444;background:#2a2a2a;color:#fff;border-radius:6px;cursor:pointer">Retry</button></div>`;
            });
    }

    function setActionFilter(f) {
        actionFilter = f;
        document.querySelectorAll('.actions-filters .filter-btn').forEach(b => {
            b.classList.toggle('active', b.getAttribute('data-apri') === f);
        });
        renderActions();
    }

    function renderActions() {
        if (!actionsData || !Array.isArray(actionsData)) {
            document.getElementById('actionsList').innerHTML =
                '<div class="empty-state">No actions data available</div>';
            return;
        }

        const filtered = actionFilter === 'all'
            ? actionsData
            : actionsData.filter(a => a.priority === actionFilter);

        const counts = { high: 0, medium: 0, low: 0 };
        let totalSales = 0;
        actionsData.forEach(a => {
            counts[a.priority] = (counts[a.priority] || 0) + 1;
            totalSales += parseFloat(a.avg_sale_amount || 0);
        });

        document.getElementById('actionsSummary').innerHTML = `
            <div class="actions-stat-row">
                <span><strong>${actionsData.length}</strong> actions</span>
                <span>Lost sales: <strong style="color:#f59e0b">${Math.round(totalSales).toLocaleString('ru-RU')} ₽/wk</strong></span>
            </div>
            <div class="actions-stat-row">
                <span class="apri-high">${counts.high} high</span>
                <span class="apri-med">${counts.medium} medium</span>
                <span class="apri-low">${counts.low} low</span>
            </div>
        `;

        if (filtered.length === 0) {
            document.getElementById('actionsList').innerHTML =
                '<div class="empty-state">No actions match this filter</div>';
            return;
        }

        document.getElementById('actionsList').innerHTML = filtered.map((a, i) => {
            const sale = parseFloat(a.avg_sale_amount || 0);
            const priClass = a.priority === 'high' ? 'apri-high' : a.priority === 'medium' ? 'apri-med' : 'apri-low';
            const statusClass = a.status === 'completed' ? 'astatus-done' : a.status === 'in_progress' ? 'astatus-wip' : '';

            return `
                <div class="action-card ${priClass}" data-action-id="${a.id}">
                    <div class="action-rank">${i + 1}</div>
                    <div class="action-body">
                        <div class="action-name">${a.product_name || a.tiny_name}</div>
                        <div class="action-lost-sales">
                            ${sale > 0
                                ? `Lost: <strong>${sale.toLocaleString('ru-RU', {maximumFractionDigits:0})} ₽/wk</strong>`
                                : `<span style="color:var(--text-secondary)">No sales data</span>`}
                        </div>
                        <div class="action-meta">
                            ${a.brand ? `<span class="tag-brand">${a.brand}</span>` : ''}
                            <span class="tag-plano">P:${a.planogram_facings}</span>
                            <span class="tag-oos">Out of shelf</span>
                        </div>
                        <div class="action-stats">
                            <span>Qty: <strong>${parseFloat(a.avg_sale_qty || 0).toFixed(1)}</strong>/wk</span>
                            <span>Stock: <strong>${parseFloat(a.avg_stock_qty || 0).toFixed(1)}</strong></span>
                            <span>${a.width_cm}×${a.height_cm} cm</span>
                        </div>
                    </div>
                    <div class="action-priority ${priClass}">${a.priority}</div>
                </div>
            `;
        }).join('');
    }

    // Initial load: fetch planogram facings + sales data then load photos
    Promise.all([
        fetch('/api/planogram-facings').then(r => r.json()).catch(err => {
            console.error('[photo_viewer] Failed to load planogram facings:', err);
            return {};
        }),
        fetch('/api/sales-data').then(r => r.json()).catch(err => {
            console.error('[photo_viewer] Failed to load sales data:', err);
            return {};
        }),
    ]).then(([facings, sales]) => {
        planogramFacings = facings;
        salesData = sales;
        console.log('[photo_viewer] Loaded planogram facings:', Object.keys(facings).length, 'products');
        console.log('[photo_viewer] Sample facings:', Object.keys(facings).slice(0, 5));
    }).finally(() => {
        if (PHOTOS.length > 0) loadAllPhotos();
    });

    // Pre-load actions count for the badge
    fetch('/api/actions').then(r => r.json()).then(data => {
        if (data.status === 'success') {
            actionsData = data.actions;
            actionsLoaded = true;
            const badge = document.getElementById('actionsBadge');
            badge.textContent = data.actions.length;
        }
    }).catch(err => {
        console.error('[photo_viewer] Failed to pre-load actions:', err);
        actionsLoaded = false;
    });

    // Settings dropdown toggle
    function toggleSettings(event) {
        event.stopPropagation();
        const menu = document.getElementById('settingsMenu');
        menu.classList.toggle('open');
    }

    // Close settings menu when clicking outside
    document.addEventListener('click', (e) => {
        const menu = document.getElementById('settingsMenu');
        const settingsBtn = document.querySelector('.settings-btn');
        if (menu.classList.contains('open') && !e.target.closest('.settings-dropdown')) {
            menu.classList.remove('open');
        }
    });
    </script>
