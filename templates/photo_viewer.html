<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Viewer — Planogram Agent</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/bay-renderer.css">
    <link rel="stylesheet" href="/static/css/planogram.css">
    <link rel="stylesheet" href="/static/css/photo-viewer.css">
</head>
<body class="photo-viewer">
    <div class="toolbar">
        <a href="/photo-viewer" class="back-link">&larr; Back</a>
        <div class="sep"></div>
        <h1>Photo Viewer</h1>
        <div class="sep"></div>

        <div class="settings-dropdown">
            <button class="settings-btn">⚙️ Settings</button>
            <div class="settings-menu" id="settingsMenu">
                <div class="settings-section">
                    <div class="settings-label">View Mode</div>
                    <div class="view-toggle" id="viewModeToggle">
                        <button class="active" data-view="all">All Photos</button>
                        <button data-view="single">Single</button>
                    </div>
                    <select id="photoSelect" style="display:none;margin-top:8px;width:100%;font-size:11px;padding:5px 8px">
                        {% for p in photos %}
                        <option value="{{ p }}">{{ p }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="settings-section">
                    <div class="settings-label">Zoom</div>
                    <div class="zoom-controls">
                        <button data-action="zoom-out" title="Zoom out">&minus;</button>
                        <span class="zoom-label" id="zoomLabel">fit</span>
                        <button data-action="zoom-in" title="Zoom in">+</button>
                        <button data-action="zoom-fit" title="Fit to window">Fit</button>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-label">Display Layers</div>
                    <label>
                        <input type="checkbox" id="showProducts" checked>
                        Products
                    </label>
                    <label>
                        <input type="checkbox" id="showShelves">
                        Shelves
                    </label>
                    <label>
                        <input type="checkbox" id="showLabels">
                        Labels
                    </label>
                </div>
                <div class="settings-section">
                    <div class="settings-label">Color Mode</div>
                    <div class="view-toggle" id="colorModeToggle">
                        <button class="active" data-mode="default">Colors</button>
                        <button data-mode="salesPerMeter">₽/meter</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="sep"></div>

        <div class="stats-bar">
            <span>Photos: <strong id="statPhotos">0</strong></span>
            <span>Unique SKUs: <strong id="statUnique">0</strong></span>
            <span>Facings: <strong id="statProducts">0</strong></span>
        </div>

        <div class="sep"></div>
        <button id="actionsBtn" style="background:rgba(245,158,11,0.15);border-color:rgba(245,158,11,0.4);color:#f59e0b;font-weight:600">Actions <span id="actionsBadge"></span></button>
    </div>

    <div class="main-area">
        <div class="photos-grid" id="photosGrid"></div>

        <!-- Combined Side Panel (inline, pushes photos) -->
        <div class="side-panel" id="sidePanel">
            <div class="side-panel-header">
                <div class="side-panel-tabs">
                    <button class="side-panel-tab active" data-tab="actions">Actions <span id="actionsBadgeTab" class="tab-badge"></span></button>
                    <button class="side-panel-tab" data-tab="analytics">Analytics</button>
                </div>
                <button class="side-panel-close">&times;</button>
            </div>

            <!-- Actions Tab Content -->
            <div class="side-panel-body tab-content" id="tabActions">
                <div class="actions-summary" id="actionsSummary"></div>
                <div class="actions-filters" id="actionsFilters">
                    <button class="filter-btn active" data-apri="all">All</button>
                    <button class="filter-btn" data-apri="high">High</button>
                    <button class="filter-btn" data-apri="medium">Medium</button>
                    <button class="filter-btn" data-apri="low">Low</button>
                </div>
                <div class="actions-list" id="actionsList">
                    <div class="empty-state">Loading actions...</div>
                </div>
            </div>

            <!-- Analytics Tab Content -->
            <div class="side-panel-body tab-content" id="tabAnalytics" style="display:none">
                <div id="detailContent">
                    <div class="empty-state">Click a bounding box to see details</div>
                </div>

                <div class="product-list" id="productList">
                    <h3>All products across photos</h3>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search products...">
                    <div class="filter-bar" id="filterBar">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="not-in-plano">Not in plano</button>
                        <button class="filter-btn" data-filter="less">Less</button>
                        <button class="filter-btn" data-filter="equal">Equal</button>
                        <button class="filter-btn" data-filter="more">More</button>
                        <button class="filter-btn" data-filter="out-of-shelf">Out of shelf</button>
                    </div>
                    <div class="filter-counts" id="filterCounts"></div>
                    <div id="productListItems"></div>
                </div>
            </div>
        </div>
    </div>

    <script>var _PHOTOS_INIT = {{ photos | tojson }};</script>
    <script src="/static/js/photo-viewer/state.js"></script>
    <script src="/static/js/photo-viewer/detail-panel.js"></script>
    <script src="/static/js/photo-viewer/color-mode.js"></script>
    <script src="/static/js/photo-viewer/overlay.js"></script>
    <script src="/static/js/photo-viewer/product-list.js"></script>
    <script src="/static/js/photo-viewer/actions-panel.js"></script>
    <script src="/static/js/photo-viewer/zoom.js"></script>
    <script src="/static/js/photo-viewer/data.js"></script>
    <script>
    var useMetric = true;
    function dFmt(inches) {
        return +(inches * 2.54).toFixed(1) + ' cm';
    }
    </script>
    <script src="/static/js/bay-renderer.js"></script>
    <script src="/static/js/photo-viewer/planogram-mini.js"></script>
    <script src="/static/js/photo-viewer/init.js"></script>
</body>
</html>
