<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Viewer — Planogram Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
            z-index: 100;
            flex-wrap: wrap;
        }

        .toolbar h1 {
            font-size: 15px;
            font-weight: 600;
            color: #e94560;
            white-space: nowrap;
        }

        .toolbar select, .toolbar button {
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #0f3460;
            background: #1a1a2e;
            color: #e0e0e0;
            cursor: pointer;
        }

        .toolbar button:hover { background: #0f3460; }

        .toolbar button.active {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
        }

        .toolbar .sep {
            width: 1px;
            height: 24px;
            background: #0f3460;
        }

        .toolbar label {
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            user-select: none;
        }

        .toolbar input[type="checkbox"] { accent-color: #e94560; }

        .main-area {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .photos-grid {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: scroll;
            gap: 8px;
            padding: 8px;
            align-items: flex-start;
            cursor: grab;
        }

        .photos-grid.dragging { cursor: grabbing; }

        .photo-card {
            position: relative;
            background: #111;
            border: 1px solid #0f3460;
            border-radius: 4px;
            overflow: visible;
            flex-shrink: 0;
        }

        .photo-card .photo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
        }

        .photo-card .photo-title {
            color: #e94560;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .photo-card .photo-stats {
            color: #888;
            font-size: 10px;
            white-space: nowrap;
        }

        .photo-card .photo-stats strong { color: #e0e0e0; }

        .canvas-inner {
            position: relative;
            display: inline-block;
        }

        .canvas-inner img {
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        .canvas-inner svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .bbox-product {
            pointer-events: all;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .bbox-product:hover { opacity: 1 !important; }

        .bbox-shelf {
            pointer-events: all;
            cursor: pointer;
        }

        .bbox-label {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 600;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
        }

        .detail-panel {
            width: 320px;
            background: #16213e;
            border-left: 1px solid #0f3460;
            overflow-y: auto;
            flex-shrink: 0;
            padding: 16px;
            font-size: 12px;
            transition: width 0.2s, padding 0.2s, opacity 0.2s;
        }

        .detail-panel.hidden {
            width: 0;
            padding: 0;
            overflow: hidden;
            opacity: 0;
            border-left: none;
        }

        .detail-panel h2 {
            font-size: 14px;
            color: #e94560;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #0f3460;
        }

        .detail-panel .field { margin-bottom: 8px; }

        .detail-panel .field-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            margin-bottom: 2px;
        }

        .detail-panel .field-value {
            color: #e0e0e0;
            word-break: break-word;
        }

        .detail-panel .empty-state {
            color: #666;
            font-style: italic;
            text-align: center;
            margin-top: 40px;
        }

        .stats-bar {
            display: flex;
            gap: 16px;
            margin-left: auto;
            font-size: 11px;
            color: #888;
        }

        .stats-bar span { white-space: nowrap; }
        .stats-bar strong { color: #e0e0e0; }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .zoom-controls button {
            width: 28px;
            height: 28px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .zoom-controls .zoom-label {
            font-size: 11px;
            color: #888;
            min-width: 40px;
            text-align: center;
        }

        .back-link {
            color: #e94560;
            text-decoration: none;
            font-size: 12px;
        }

        .back-link:hover { text-decoration: underline; }

        .product-list {
            margin-top: 16px;
            border-top: 1px solid #0f3460;
            padding-top: 12px;
        }

        .product-list h3 {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }

        .product-list-item {
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.1s;
        }

        .product-list-item:hover { background: rgba(233,69,96,0.15); }
        .product-list-item.selected { background: rgba(233,69,96,0.25); }

        .product-list-item .color-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .product-list-item .thumb {
            width: 28px;
            height: 28px;
            object-fit: contain;
            border-radius: 3px;
            background: #222;
            flex-shrink: 0;
        }

        .search-input {
            width: 100%;
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid #0f3460;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .search-input::placeholder { color: #555; }

        .detail-thumb {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 6px;
            background: #222;
            border: 1px solid #0f3460;
        }

        .detail-header {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .detail-header-info { flex: 1; }

        .tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            margin-right: 4px;
            margin-bottom: 3px;
        }

        .tag-brand { background: #0f3460; color: #4cc9f0; }
        .tag-category { background: #1a1a2e; color: #90be6d; border: 1px solid #333; }
        .tag-price { background: #2d1b4e; color: #f9c74f; }
        .tag-assortment { background: #1a2e1a; color: #90be6d; border: 1px solid #333; }
        .tag-support { background: #4a1a1a; color: #e94560; }
        .tag-photo { background: #0f3460; color: #f9c74f; }

        .dims-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 12px;
            font-size: 11px;
        }

        .dims-grid .dim-label { color: #888; font-size: 10px; }
        .dims-grid .dim-value { color: #e0e0e0; font-family: monospace; }

        .tag-plano {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 600;
            background: #1a3a1a;
            color: #90be6d;
            border: 1px solid #2a5a2a;
            margin-right: 3px;
        }

        .tag-photo-f {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 600;
            background: #0f3460;
            color: #4cc9f0;
            margin-right: 3px;
        }

        .tag-alert {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 600;
            background: #4a1a1a;
            color: #e94560;
            border: 1px solid #7a2a2a;
            margin-right: 3px;
        }

        .product-list-item.not-in-plano {
            border-left: 3px solid #e94560;
        }

        .view-toggle {
            display: flex;
            gap: 2px;
            background: #111;
            border-radius: 4px;
            padding: 2px;
        }

        .view-toggle button {
            border: none;
            background: transparent;
            color: #888;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
        }

        .view-toggle button.active {
            background: #e94560;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <a href="/" class="back-link">&larr; Back</a>
        <div class="sep"></div>
        <h1>Photo Viewer</h1>
        <div class="sep"></div>

        <div class="view-toggle">
            <button class="active" onclick="setView('all')">All Photos</button>
            <button onclick="setView('single')">Single</button>
        </div>

        <select id="photoSelect" style="display:none" onchange="loadSinglePhoto(this.value)">
            {% for p in photos %}
            <option value="{{ p }}">{{ p }}</option>
            {% endfor %}
        </select>

        <div class="sep"></div>

        <label>
            <input type="checkbox" id="showProducts" checked onchange="renderAllOverlays()">
            Products
        </label>
        <label>
            <input type="checkbox" id="showShelves" checked onchange="renderAllOverlays()">
            Shelves
        </label>
        <label>
            <input type="checkbox" id="showLabels" checked onchange="renderAllOverlays()">
            Labels
        </label>

        <div class="sep"></div>

        <div class="zoom-controls">
            <button onclick="zoomAll(-0.05)" title="Zoom out">&minus;</button>
            <span class="zoom-label" id="zoomLabel">fit</span>
            <button onclick="zoomAll(0.05)" title="Zoom in">+</button>
            <button onclick="zoomFitAll()" title="Fit to window">Fit</button>
        </div>

        <div class="stats-bar">
            <span>Photos: <strong id="statPhotos">0</strong></span>
            <span>Unique SKUs: <strong id="statUnique">0</strong></span>
            <span>Facings: <strong id="statProducts">0</strong></span>
        </div>

        <div class="sep"></div>
        <button id="togglePanelBtn" onclick="togglePanel()">Hide Details</button>
    </div>

    <div class="main-area">
        <div class="photos-grid" id="photosGrid"></div>

        <div class="detail-panel" id="detailPanel">
            <h2>Details</h2>
            <div id="detailContent">
                <div class="empty-state">Click a bounding box to see details</div>
            </div>

            <div class="product-list" id="productList">
                <h3>All products across photos</h3>
                <input type="text" class="search-input" id="searchInput" placeholder="Search products..." oninput="filterProductList()">
                <div id="productListItems"></div>
            </div>
        </div>
    </div>

    <script>
    const PHOTOS = {{ photos | tojson }};
    const photoDataMap = {};   // photoName → {products, shelves, source}
    const photoScales = {};    // photoName → scale
    const photoNaturalSizes = {}; // photoName → {w, h}
    let planogramFacings = {}; // tiny_name → {facings_wide, positions}

    let currentView = 'all';
    let selectedId = null;
    let selectedPhotoName = null;
    let selectedArt = null;
    let globalScale = null;    // will be computed on fit

    const PRODUCT_COLORS = {};
    const COLOR_PALETTE = [
        '#e94560','#00b4d8','#90be6d','#f9c74f','#f8961e',
        '#43aa8b','#577590','#f3722c','#4cc9f0','#7209b7',
        '#3a86a7','#fb5607','#ff006e','#8338ec','#06d6a0',
        '#118ab2','#ef476f','#ffd166','#073b4c','#06aed5'
    ];

    function getColorForArt(art) {
        if (!PRODUCT_COLORS[art]) {
            const idx = Object.keys(PRODUCT_COLORS).length % COLOR_PALETTE.length;
            PRODUCT_COLORS[art] = COLOR_PALETTE[idx];
        }
        return PRODUCT_COLORS[art];
    }

    function setView(mode) {
        currentView = mode;
        document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('photoSelect').style.display = mode === 'single' ? '' : 'none';
        if (mode === 'single') {
            const sel = document.getElementById('photoSelect').value;
            loadSinglePhoto(sel);
        } else {
            loadAllPhotos();
        }
    }

    function loadSinglePhoto(name) {
        buildGrid([name]);
    }

    async function loadAllPhotos() {
        buildGrid(PHOTOS);
    }

    function buildGrid(photoNames) {
        const grid = document.getElementById('photosGrid');
        grid.innerHTML = '';
        let loadedCount = 0;

        photoNames.forEach(name => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.id = `card-${name}`;
            card.innerHTML = `
                <div class="photo-header">
                    <span class="photo-title">${name}</span>
                    <span class="photo-stats" id="stats-${name}">Loading...</span>
                </div>
                <div class="canvas-inner" id="canvas-${name}">
                    <img id="img-${name}" alt="${name}">
                    <svg id="svg-${name}" xmlns="http://www.w3.org/2000/svg"></svg>
                </div>
            `;
            grid.appendChild(card);

            const img = document.getElementById(`img-${name}`);
            img.onload = function() {
                photoNaturalSizes[name] = { w: img.naturalWidth, h: img.naturalHeight };
                fetchPhotoData(name);
                loadedCount++;
                if (loadedCount === photoNames.length) {
                    setTimeout(zoomFitAll, 50);
                }
            };
            img.src = `/demo-images/${name}.jpg`;
        });
    }

    async function fetchPhotoData(name) {
        if (photoDataMap[name]) {
            renderOverlay(name);
            updateStats();
            return;
        }
        const resp = await fetch(`/api/photo-data/${name}`);
        photoDataMap[name] = await resp.json();
        renderOverlay(name);
        updateStats();
        renderProductList();
    }

    function updateStats() {
        const activePhotos = Object.keys(photoDataMap).filter(n =>
            document.getElementById(`card-${n}`)
        );
        let totalFacings = 0;
        const uniqueArts = new Set();
        activePhotos.forEach(n => {
            const data = photoDataMap[n];
            if (!data) return;
            totalFacings += data.products.length;
            data.products.forEach(p => uniqueArts.add(p.art));
        });
        document.getElementById('statPhotos').textContent = activePhotos.length;
        document.getElementById('statUnique').textContent = uniqueArts.size;
        document.getElementById('statProducts').textContent = totalFacings;
    }

    function renderAllOverlays() {
        PHOTOS.forEach(name => {
            if (photoDataMap[name] && document.getElementById(`svg-${name}`)) {
                renderOverlay(name);
            }
        });
    }

    function renderOverlay(name) {
        const data = photoDataMap[name];
        if (!data) return;
        const size = photoNaturalSizes[name];
        if (!size) return;

        const svg = document.getElementById(`svg-${name}`);
        svg.setAttribute('width', size.w);
        svg.setAttribute('height', size.h);
        svg.setAttribute('viewBox', `0 0 ${size.w} ${size.h}`);
        svg.innerHTML = '';

        const showProducts = document.getElementById('showProducts').checked;
        const showShelves = document.getElementById('showShelves').checked;
        const showLabels = document.getElementById('showLabels').checked;

        const statsEl = document.getElementById(`stats-${name}`);
        if (statsEl) {
            const uniqueInPhoto = new Set(data.products.map(p => p.art)).size;
            statsEl.innerHTML = `SKUs: <strong>${uniqueInPhoto}</strong> &nbsp; Facings: <strong>${data.products.length}</strong> &nbsp; Shelves: <strong>${data.shelves.length}</strong>`;
        }

        if (showShelves) {
            const gShelves = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            data.shelves.forEach((s, i) => {
                const y = Math.min(s.y1, s.y2);
                const h = Math.abs(s.y2 - s.y1) || 6;

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', s.x1);
                rect.setAttribute('y', y - 3);
                rect.setAttribute('width', s.x2 - s.x1);
                rect.setAttribute('height', h + 6);
                rect.setAttribute('fill', 'rgba(0,180,216,0.2)');
                rect.setAttribute('stroke', '#00b4d8');
                rect.setAttribute('stroke-width', '8');
                rect.setAttribute('class', 'bbox-shelf');
                rect.setAttribute('data-shelf-idx', i);
                rect.setAttribute('data-photo', name);
                rect.onclick = () => selectShelf(name, i);
                gShelves.appendChild(rect);

                if (showLabels) {
                    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    txt.setAttribute('x', s.x1 + 8);
                    txt.setAttribute('y', y - 8);
                    txt.setAttribute('fill', '#00b4d8');
                    txt.setAttribute('font-size', '40');
                    txt.setAttribute('class', 'bbox-label');
                    txt.textContent = `Shelf ${i + 1}`;
                    gShelves.appendChild(txt);
                }
            });
            svg.appendChild(gShelves);
        }

        if (showProducts) {
            const gProducts = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            data.products.forEach((p, i) => {
                const color = getColorForArt(p.art);
                const w = p.x2 - p.x1;
                const h = p.y2 - p.y1;

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', p.x1);
                rect.setAttribute('y', p.y1);
                rect.setAttribute('width', w);
                rect.setAttribute('height', h);
                rect.setAttribute('fill', color + '22');
                rect.setAttribute('stroke', color);
                rect.setAttribute('stroke-width', '6');
                rect.setAttribute('rx', '4');
                rect.setAttribute('class', 'bbox-product');
                rect.setAttribute('data-product-idx', i);
                rect.setAttribute('data-product-id', p._id);
                rect.setAttribute('data-art', p.art);
                rect.setAttribute('data-photo', name);
                rect.style.opacity = (selectedId === p._id && selectedPhotoName === name) ? '1' : '0.7';
                rect.onclick = (e) => { e.stopPropagation(); selectProduct(name, i); };
                gProducts.appendChild(rect);

                if (showLabels) {
                    const labelBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    const displayName = p.display_name || p.art;
                    const fontSize = Math.min(36, Math.max(16, w * 0.12));
                    const labelW = Math.min(w, displayName.length * fontSize * 0.55 + 8);
                    const labelH = fontSize + 6;
                    labelBg.setAttribute('x', p.x1);
                    labelBg.setAttribute('y', p.y1 - labelH);
                    labelBg.setAttribute('width', labelW);
                    labelBg.setAttribute('height', labelH);
                    labelBg.setAttribute('fill', color);
                    labelBg.setAttribute('rx', '3');
                    labelBg.setAttribute('class', 'bbox-label-bg');
                    labelBg.setAttribute('data-art', p.art);
                    labelBg.style.pointerEvents = 'none';
                    gProducts.appendChild(labelBg);

                    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    txt.setAttribute('x', p.x1 + 4);
                    txt.setAttribute('y', p.y1 - 5);
                    txt.setAttribute('fill', '#fff');
                    txt.setAttribute('font-size', fontSize);
                    txt.setAttribute('class', 'bbox-label');
                    txt.setAttribute('data-art', p.art);
                    txt.textContent = displayName;
                    gProducts.appendChild(txt);
                }
            });
            svg.appendChild(gProducts);
        }

        highlightSelected();
    }

    function selectProduct(photoName, idx) {
        const data = photoDataMap[photoName];
        const p = data.products[idx];
        selectedId = p._id;
        selectedPhotoName = photoName;
        selectedArt = p.art;
        const isRich = !!p.brand_name;

        // Count facings across all photos for this art
        let totalPhotoFacings = 0;
        const photoBreakdown = [];
        PHOTOS.forEach(name => {
            const d = photoDataMap[name];
            if (!d) return;
            const cnt = d.products.filter(pp => pp.art === p.art).length;
            if (cnt > 0) {
                totalPhotoFacings += cnt;
                photoBreakdown.push({ name, count: cnt });
            }
        });
        const pf = planogramFacings[p.art];
        const inPlano = !!pf;
        const planoFacings = pf ? pf.facings_wide : 0;

        let html = '';

        // Header with thumbnail and name
        const displayName = p.display_name || p.art;
        const thumbUrl = p.miniature_url || '';
        html += `
            <div class="detail-header">
                ${thumbUrl ? `<img class="detail-thumb" src="${thumbUrl}" alt="${displayName}" onerror="this.style.display='none'">` : ''}
                <div class="detail-header-info">
                    <div class="field-value" style="font-weight:600;font-size:13px;margin-bottom:4px">${displayName}</div>
                    <div style="margin-bottom:4px">
                        ${p.brand_name ? `<span class="tag tag-brand">${p.brand_name}</span>` : ''}
                        ${p.category_name ? `<span class="tag tag-category">${p.category_name}</span>` : ''}
                    </div>
                    ${p.price ? `<span class="tag tag-price">${p.price} ₽</span>` : ''}
                </div>
            </div>
        `;

        // Planogram status
        html += `<div class="field" style="margin-bottom:12px">`;
        if (inPlano) {
            html += `<span class="tag-plano" style="font-size:11px;padding:3px 8px">In Planogram</span>`;
        } else {
            html += `<span class="tag-alert" style="font-size:11px;padding:3px 8px">Not in Planogram</span>`;
        }
        html += `</div>`;

        // Facings comparison
        html += `
            <div class="field">
                <div class="field-label">Facings Comparison</div>
                <div class="dims-grid" style="margin-top:4px">
                    <span class="dim-label">Planogram</span><span class="dim-value">${inPlano ? planoFacings : '—'}</span>
                    <span class="dim-label">On Shelf (photos)</span><span class="dim-value">${totalPhotoFacings}</span>
                </div>
            </div>
        `;

        // Per-photo breakdown
        if (photoBreakdown.length > 0) {
            html += `<div class="field"><div class="field-label">Per Photo</div>`;
            photoBreakdown.forEach(pb => {
                html += `<div style="font-size:11px;color:#ccc;margin-top:2px">${pb.name}: <strong>${pb.count}</strong> facing${pb.count > 1 ? 's' : ''}</div>`;
            });
            html += `</div>`;
        }

        // Key product info
        if (p.full_name) {
            html += `<div class="field"><div class="field-label">Full Name</div><div class="field-value" style="font-size:11px">${p.full_name}</div></div>`;
        }
        if (p.barcode) {
            html += `<div class="field"><div class="field-label">Barcode</div><div class="field-value" style="font-family:monospace;font-size:11px">${p.barcode}</div></div>`;
        }
        if (p.facing_width_cm) {
            html += `<div class="field"><div class="field-label">Size (cm)</div><div class="field-value" style="font-size:11px">${p.facing_width_cm.toFixed(1)} × ${p.facing_height_cm.toFixed(1)}</div></div>`;
        }
        document.getElementById('detailContent').innerHTML = html;
        highlightSelected();
        highlightListItem();
    }

    function selectShelf(photoName, idx) {
        const data = photoDataMap[photoName];
        const s = data.shelves[idx];
        selectedId = s._id;
        selectedPhotoName = photoName;

        const html = `
            <span class="tag tag-photo">${photoName}</span><br><br>
            <div class="field">
                <div class="field-label">Type</div>
                <div class="field-value">Shelf Line ${idx + 1}</div>
            </div>
            <div class="field">
                <div class="field-label">Line Coordinates</div>
                <div class="field-value" style="font-family:monospace">
                    (${s.x1}, ${s.y1}) &rarr; (${s.x2}, ${s.y2})
                    <br>Width: ${s.x2 - s.x1} px
                </div>
            </div>
            <div class="field">
                <div class="field-label">Line Type</div>
                <div class="field-value">${s.line_type || 'raw'}</div>
            </div>
            <div class="field">
                <div class="field-label">Approved</div>
                <div class="field-value">${s.approved ? 'Yes' : 'No'}</div>
            </div>
            <div class="field">
                <div class="field-label">ID</div>
                <div class="field-value" style="font-family:monospace;font-size:10px">${s._id}</div>
            </div>
        `;
        document.getElementById('detailContent').innerHTML = html;
        highlightSelected();
    }

    function highlightSelected() {
        const hasSelection = !!selectedArt;

        document.querySelectorAll('.bbox-product').forEach(el => {
            const art = el.getAttribute('data-art');
            const origColor = getColorForArt(art);

            if (!hasSelection) {
                el.setAttribute('stroke', origColor);
                el.setAttribute('fill', origColor + '22');
                el.setAttribute('stroke-width', '6');
                el.style.opacity = '0.7';
            } else if (art === selectedArt) {
                el.setAttribute('stroke', '#ffd166');
                el.setAttribute('fill', 'rgba(255,209,102,0.25)');
                el.setAttribute('stroke-width', '10');
                el.style.opacity = '1';
            } else {
                el.setAttribute('stroke', '#666');
                el.setAttribute('fill', 'rgba(100,100,100,0.15)');
                el.setAttribute('stroke-width', '4');
                el.style.opacity = '0.4';
            }
        });

        document.querySelectorAll('.bbox-label-bg').forEach(el => {
            const art = el.getAttribute('data-art');
            const origColor = getColorForArt(art);
            if (!hasSelection) {
                el.setAttribute('fill', origColor);
                el.style.opacity = '1';
            } else if (art === selectedArt) {
                el.setAttribute('fill', '#ffd166');
                el.style.opacity = '1';
            } else {
                el.setAttribute('fill', '#555');
                el.style.opacity = '0.4';
            }
        });

        document.querySelectorAll('.bbox-label').forEach(el => {
            const art = el.getAttribute('data-art');
            if (!hasSelection || art === selectedArt) {
                el.style.opacity = '1';
            } else {
                el.style.opacity = '0.3';
            }
        });

        document.querySelectorAll('.bbox-shelf').forEach(el => {
            const idx = parseInt(el.getAttribute('data-shelf-idx'));
            const photo = el.getAttribute('data-photo');
            const data = photoDataMap[photo];
            if (data) {
                const s = data.shelves[idx];
                if (s._id === selectedId && photo === selectedPhotoName) {
                    el.setAttribute('stroke-width', '12');
                    el.setAttribute('fill', 'rgba(0,180,216,0.35)');
                } else {
                    el.setAttribute('stroke-width', '8');
                    el.setAttribute('fill', 'rgba(0,180,216,0.2)');
                }
            }
        });
    }

    function clearSelection() {
        selectedId = null;
        selectedPhotoName = null;
        selectedArt = null;
        document.getElementById('detailContent').innerHTML =
            '<div class="empty-state">Click a bounding box to see details</div>';
        highlightSelected();
        highlightListItem();
    }

    function renderProductList() {
        const artCounts = {};
        PHOTOS.forEach(name => {
            const data = photoDataMap[name];
            if (!data) return;
            data.products.forEach(p => {
                const key = p.art;
                if (!artCounts[key]) {
                    artCounts[key] = {
                        count: 0,
                        display_name: p.display_name,
                        miniature_url: p.miniature_url || '',
                        brand_name: p.brand_name || '',
                        photos: new Set(),
                        firstPhoto: name,
                        firstIdx: data.products.indexOf(p),
                    };
                }
                artCounts[key].count++;
                artCounts[key].photos.add(name);
            });
        });

        const items = Object.entries(artCounts)
            .sort((a, b) => {
                const aIn = planogramFacings[a[0]] ? 1 : 0;
                const bIn = planogramFacings[b[0]] ? 1 : 0;
                if (aIn !== bIn) return bIn - aIn;
                return b[1].count - a[1].count;
            });

        const container = document.getElementById('productListItems');
        container.innerHTML = items.map(([art, info]) => {
            const thumb = info.miniature_url
                ? `<img class="thumb" src="${info.miniature_url}" alt="" onerror="this.style.display='none'">`
                : `<span class="color-dot" style="background:${getColorForArt(art)}"></span>`;
            const pf = planogramFacings[art];
            const inPlano = !!pf;
            const planoFacings = pf ? pf.facings_wide : 0;
            const photoFacings = info.count;

            let badge = '';
            if (inPlano) {
                badge = `<span class="tag-plano">P:${planoFacings}</span><span class="tag-photo-f">S:${photoFacings}</span>`;
            } else {
                badge = `<span class="tag-alert">Not in plano</span><span class="tag-photo-f">S:${photoFacings}</span>`;
            }

            return `
                <div class="product-list-item${inPlano ? '' : ' not-in-plano'}" data-art="${art}" data-photo="${info.firstPhoto}" onclick="selectByArt('${art}')">
                    ${thumb}
                    <span style="flex:1">
                        ${info.display_name}${info.brand_name ? `<br><span style="font-size:9px;color:#888">${info.brand_name}</span>` : ''}
                        <br>${badge}
                    </span>
                </div>
            `;
        }).join('');
    }

    function selectByArt(art) {
        for (const name of PHOTOS) {
            const data = photoDataMap[name];
            if (!data) continue;
            const idx = data.products.findIndex(p => p.art === art);
            if (idx >= 0) {
                selectProduct(name, idx);
                return;
            }
        }
    }

    function highlightListItem() {
        document.querySelectorAll('.product-list-item').forEach(el => {
            el.classList.remove('selected');
        });
        if (selectedId && selectedPhotoName) {
            const data = photoDataMap[selectedPhotoName];
            if (data) {
                const p = data.products.find(pp => pp._id === selectedId);
                if (p) {
                    const el = document.querySelector(`.product-list-item[data-art="${p.art}"]`);
                    if (el) el.classList.add('selected');
                }
            }
        }
    }

    function filterProductList() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.product-list-item').forEach(el => {
            const text = el.textContent.toLowerCase();
            el.style.display = (!q || text.includes(q)) ? '' : 'none';
        });
    }

    // Zoom: set actual image width so layout reflows properly for scrolling
    function applyScaleToPhoto(name, scale) {
        const img = document.getElementById(`img-${name}`);
        const size = photoNaturalSizes[name];
        if (!img || !size) return;
        const w = Math.round(size.w * scale);
        const h = Math.round(size.h * scale);
        img.style.width = w + 'px';
        img.style.height = h + 'px';
        photoScales[name] = scale;
    }

    function zoomAll(delta) {
        if (globalScale === null) globalScale = 0.3;
        globalScale = Math.max(0.05, Math.min(2, globalScale + delta));
        PHOTOS.forEach(name => {
            if (document.getElementById(`canvas-${name}`)) {
                applyScaleToPhoto(name, globalScale);
            }
        });
        document.getElementById('zoomLabel').textContent = Math.round(globalScale * 100) + '%';
    }

    function zoomFitAll() {
        const grid = document.getElementById('photosGrid');
        const panel = document.getElementById('detailPanel');
        const toolbar = document.querySelector('.toolbar');
        const visiblePhotos = PHOTOS.filter(n => document.getElementById(`card-${n}`));
        const count = visiblePhotos.length || 1;

        // Compute available space: window minus detail panel, toolbar, padding, gaps, borders
        const totalW = window.innerWidth - panel.offsetWidth - 1;
        const totalH = window.innerHeight - toolbar.offsetHeight;
        const headerH = 26; // photo-header height per card
        const pad = 16;
        const gaps = (count - 1) * 8;
        const availW = (totalW - pad - gaps) / count;
        const availH = totalH - pad - headerH;

        let fitScale = 1;
        visiblePhotos.forEach(name => {
            const size = photoNaturalSizes[name];
            if (!size) return;
            const sw = availW / size.w;
            const sh = availH / size.h;
            fitScale = Math.min(fitScale, sw, sh);
        });

        globalScale = Math.max(0.02, fitScale);
        visiblePhotos.forEach(name => applyScaleToPhoto(name, globalScale));
        document.getElementById('zoomLabel').textContent = Math.round(globalScale * 100) + '%';
    }

    function togglePanel() {
        const panel = document.getElementById('detailPanel');
        const btn = document.getElementById('togglePanelBtn');
        panel.classList.toggle('hidden');
        btn.textContent = panel.classList.contains('hidden') ? 'Show Details' : 'Hide Details';
        setTimeout(zoomFitAll, 250);
    }

    // Mouse wheel zoom on grid
    document.getElementById('photosGrid').addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.02 : 0.02;
        zoomAll(delta);
    }, { passive: false });

    // Drag-to-pan
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let scrollStartX = 0, scrollStartY = 0;

    const grid = document.getElementById('photosGrid');

    grid.addEventListener('mousedown', (e) => {
        if (e.target.closest('.bbox-product') || e.target.closest('.bbox-shelf')) return;
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        scrollStartX = grid.scrollLeft;
        scrollStartY = grid.scrollTop;
        grid.classList.add('dragging');
        e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        grid.scrollLeft = scrollStartX - dx;
        grid.scrollTop = scrollStartY - dy;
    });

    window.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false;
            grid.classList.remove('dragging');
        }
    });

    // Click on empty space to deselect (only if not dragging)
    let dragDistance = 0;
    grid.addEventListener('mousedown', (e) => { dragDistance = 0; });
    grid.addEventListener('mousemove', () => { if (isDragging) dragDistance++; });
    grid.addEventListener('click', (e) => {
        if (dragDistance > 3) return;
        if (e.target.tagName === 'IMG' || e.target.classList.contains('photos-grid') ||
            e.target.classList.contains('photo-card')) {
            clearSelection();
        }
    });

    // Initial load: fetch planogram facings then load photos
    fetch('/api/planogram-facings')
        .then(r => r.json())
        .then(data => { planogramFacings = data; })
        .catch(() => { planogramFacings = {}; })
        .finally(() => {
            if (PHOTOS.length > 0) loadAllPhotos();
        });
    </script>
</body>
</html>
