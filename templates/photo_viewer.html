<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Viewer — Planogram Agent</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/bay-renderer.css">
    <link rel="stylesheet" href="/static/css/planogram.css">
    <link rel="stylesheet" href="/static/css/photo-viewer.css">
</head>
<body class="photo-viewer">
    <div class="toolbar">
        <a href="/" class="back-link">&larr; Back</a>
        <div class="sep"></div>
        <h1>Photo Viewer</h1>
        <div class="sep"></div>

        <div class="settings-dropdown">
            <button class="settings-btn" onclick="toggleSettings(event)">⚙️ Settings</button>
            <div class="settings-menu" id="settingsMenu">
                <div class="settings-section">
                    <div class="settings-label">View Mode</div>
                    <div class="view-toggle">
                        <button class="active" onclick="setView('all')">All Photos</button>
                        <button onclick="setView('single')">Single</button>
                    </div>
                    <select id="photoSelect" style="display:none;margin-top:8px;width:100%;font-size:11px;padding:5px 8px" onchange="loadSinglePhoto(this.value)">
                        {% for p in photos %}
                        <option value="{{ p }}">{{ p }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="settings-section">
                    <div class="settings-label">Zoom</div>
                    <div class="zoom-controls">
                        <button onclick="zoomAll(-0.05)" title="Zoom out">&minus;</button>
                        <span class="zoom-label" id="zoomLabel">fit</span>
                        <button onclick="zoomAll(0.05)" title="Zoom in">+</button>
                        <button onclick="zoomFitAll()" title="Fit to window">Fit</button>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-label">Display Layers</div>
                    <label>
                        <input type="checkbox" id="showProducts" checked onchange="renderAllOverlays()">
                        Products
                    </label>
                    <label>
                        <input type="checkbox" id="showShelves" onchange="renderAllOverlays()">
                        Shelves
                    </label>
                    <label>
                        <input type="checkbox" id="showLabels" onchange="renderAllOverlays()">
                        Labels
                    </label>
                </div>
                <div class="settings-section">
                    <div class="settings-label">Color Mode</div>
                    <div class="view-toggle" id="colorModeToggle">
                        <button class="active" data-mode="default" onclick="setColorMode('default')">Colors</button>
                        <button data-mode="salesPerMeter" onclick="setColorMode('salesPerMeter')">₽/meter</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="sep"></div>

        <div class="stats-bar">
            <span>Photos: <strong id="statPhotos">0</strong></span>
            <span>Unique SKUs: <strong id="statUnique">0</strong></span>
            <span>Facings: <strong id="statProducts">0</strong></span>
        </div>

        <div class="sep"></div>
        <button id="actionsBtn" onclick="openPanelTab('actions')" style="background:rgba(245,158,11,0.15);border-color:rgba(245,158,11,0.4);color:#f59e0b;font-weight:600">Actions <span id="actionsBadge"></span></button>
    </div>

    <div class="main-area">
        <div class="photos-grid" id="photosGrid"></div>

        <!-- Combined Side Panel (inline, pushes photos) -->
        <div class="side-panel" id="sidePanel">
            <div class="side-panel-header">
                <div class="side-panel-tabs">
                    <button class="side-panel-tab active" data-tab="actions" onclick="switchTab('actions')">Actions <span id="actionsBadgeTab" class="tab-badge"></span></button>
                    <button class="side-panel-tab" data-tab="analytics" onclick="switchTab('analytics')">Analytics</button>
                </div>
                <button class="side-panel-close" onclick="closeSidePanel()">&times;</button>
            </div>

            <!-- Actions Tab Content -->
            <div class="side-panel-body tab-content" id="tabActions">
                <div class="actions-summary" id="actionsSummary"></div>
                <div class="actions-filters" id="actionsFilters">
                    <button class="filter-btn active" data-apri="all" onclick="setActionFilter('all')">All</button>
                    <button class="filter-btn" data-apri="high" onclick="setActionFilter('high')">High</button>
                    <button class="filter-btn" data-apri="medium" onclick="setActionFilter('medium')">Medium</button>
                    <button class="filter-btn" data-apri="low" onclick="setActionFilter('low')">Low</button>
                </div>
                <div class="actions-list" id="actionsList">
                    <div class="empty-state">Loading actions...</div>
                </div>
            </div>

            <!-- Analytics Tab Content -->
            <div class="side-panel-body tab-content" id="tabAnalytics" style="display:none">
                <div id="detailContent">
                    <div class="empty-state">Click a bounding box to see details</div>
                </div>

                <div class="product-list" id="productList">
                    <h3>All products across photos</h3>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search products..." oninput="filterProductList()">
                    <div class="filter-bar" id="filterBar">
                        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
                        <button class="filter-btn" data-filter="not-in-plano" onclick="setFilter('not-in-plano')">Not in plano</button>
                        <button class="filter-btn" data-filter="less" onclick="setFilter('less')">Less</button>
                        <button class="filter-btn" data-filter="equal" onclick="setFilter('equal')">Equal</button>
                        <button class="filter-btn" data-filter="more" onclick="setFilter('more')">More</button>
                        <button class="filter-btn" data-filter="out-of-shelf" onclick="setFilter('out-of-shelf')">Out of shelf</button>
                    </div>
                    <div class="filter-counts" id="filterCounts"></div>
                    <div id="productListItems"></div>
                </div>
            </div>
        </div>
    </div>

    <script>var _PHOTOS_INIT = {{ photos | tojson }};</script>
    <script src="/static/js/photo-viewer/state.js"></script>
    <script src="/static/js/photo-viewer/detail-panel.js"></script>
    <script src="/static/js/photo-viewer/color-mode.js"></script>
    <script src="/static/js/photo-viewer/overlay.js"></script>
    <script src="/static/js/photo-viewer/product-list.js"></script>
    <script src="/static/js/photo-viewer/actions-panel.js"></script>
    <script src="/static/js/photo-viewer/zoom.js"></script>
    <script src="/static/js/photo-viewer/data.js"></script>
    <script>
    var useMetric = true;
    function dFmt(inches) {
        return +(inches * 2.54).toFixed(1) + ' cm';
    }
    </script>
    <script src="/static/js/bay-renderer.js"></script>
    <script src="/static/js/photo-viewer/planogram-mini.js"></script>
    <script src="/static/js/photo-viewer/init.js"></script>
</body>
</html>
